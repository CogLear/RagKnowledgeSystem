<div class="section" style="margin-top: 30px;">
  <h3>问题原因</h3>
  <p>后端不存储节点位置信息，编辑时前端用公式计算位置：</p>
  <code style="display: block; background: #f0f0f0; padding: 10px; border-radius: 4px; margin-top: 8px;">
    position: { x: 100 + index * 220, y: 200 }
  </code>
  <p style="margin-top: 10px;">结果：所有节点都在 <strong>y=200</strong> 的同一水平线上</p>
