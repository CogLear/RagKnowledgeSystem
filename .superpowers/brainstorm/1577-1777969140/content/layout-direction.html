<h2>自动布局方向</h2>
<p class="subtitle">流水线通常是从左到右的数据流，你希望节点怎么排列？</p>

<div class="options">
  <div class="option" data-choice="lr" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>从左到右 (LR)</h3>
      <p>Fetcher 在最左，后续节点依次向右延伸，符合数据流动方向</p>
    </div>
  </div>
  <div class="option" data-choice="tb" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>从上到下 (TB)</h3>
      <p>Fetcher 在顶部，节点依次向下延伸，适合节点较多时</p>
    </div>
  </div>
</div>

<div style="margin-top: 30px;">
  <h3>布局效果示意</h3>
</div>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">A: 从左到右 (LR)</div>
    <div class="mockup-body" style="padding: 20px; background: #f5f5f5; text-align: center;">
      <div style="display: flex; align-items: center; justify-content: center; gap: 60px;">
        <div style="background: white; border: 2px solid #22c55e; border-radius: 8px; padding: 10px 16px;">📥 Fetcher</div>
        <div style="color: #ccc; font-size: 24px;">→</div>
        <div style="background: white; border: 2px solid #3b82f6; border-radius: 8px; padding: 10px 16px;">📄 Parser</div>
        <div style="color: #ccc; font-size: 24px;">→</div>
        <div style="background: white; border: 2px solid #a855f7; border-radius: 8px; padding: 10px 16px;">✂️ Chunker</div>
      </div>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">B: 从上到下 (TB)</div>
    <div class="mockup-body" style="padding: 20px; background: #f5f5f5; text-align: center;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 40px;">
        <div style="background: white; border: 2px solid #22c55e; border-radius: 8px; padding: 10px 16px;">📥 Fetcher</div>
        <div style="color: #ccc; font-size: 24px;">↓</div>
        <div style="background: white; border: 2px solid #3b82f6; border-radius: 8px; padding: 10px 16px;">📄 Parser</div>
        <div style="color: #ccc; font-size: 24px;">↓</div>
        <div style="background: white; border: 2px solid #a855f7; border-radius: 8px; padding: 10px 16px;">✂️ Chunker</div>
      </div>
    </div>
  </div>
</div>
